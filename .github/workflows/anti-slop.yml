name: Anti-Slop

# Block AI-generated filler/slop phrases in PR diffs.
# Runs only on pull requests (not on pushes to main).
on:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  anti-slop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: peakoss/anti-slop@v0.2.1
