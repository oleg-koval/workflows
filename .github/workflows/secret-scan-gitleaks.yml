name: Secret Scan

# Gitleaks scan with SHA-pinned checkout and checksum verification.
# Optional: set INTERNAL_REF_PATTERN env to grep for internal references.
on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      internal-ref-pattern:
        description: 'Regex pattern to detect internal references (e.g. corp hostnames)'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          set -euo pipefail
          curl -sSL -o gitleaks.tgz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz
          echo "a65b5253807a68ac0cafa4414031fd740aeb55f54fb7e55f386acb52e6a840eb  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          ./gitleaks git --redact --exit-code 1 .

      - name: Internal reference scrub
        if: inputs.internal-ref-pattern != '' || vars.INTERNAL_REF_PATTERN != ''
        env:
          INTERNAL_REF_PATTERN: ${{ inputs.internal-ref-pattern || vars.INTERNAL_REF_PATTERN }}
        run: |
          set -euo pipefail
          if grep -rInE "$INTERNAL_REF_PATTERN" \
              --include='*.md' --include='*.yaml' --include='*.yml' \
              --include='*.json' --include='*.py' --include='*.sh' . ; then
            echo "::error::internal references found — see matches above"
            exit 1
          fi
