name: Docs Index

# Require docs/README.md index to be up to date when docs change.
# If this fails, run: npx docs-index-keeper update
on:
  push:
    branches: [main]
    paths: ['docs/**']
  pull_request:
    branches: [main]
    paths: ['docs/**']

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Check docs index is up to date
        run: npx docs-index-keeper check
