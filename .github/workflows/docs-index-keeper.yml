name: Docs Index

# Require docs/README.md index to be up to date when docs change.
# If this fails, run: npx docs-index-keeper@1.3.0 update
on:
  push:
    branches: [main]
    paths: ['docs/**']
  pull_request:
    branches: [main]
    paths: ['docs/**']

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Check docs index is up to date
        run: npx docs-index-keeper@1.3.0 check
