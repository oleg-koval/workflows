name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow YAML
        run: |
          find .github/workflows -name '*.yml' | while read f; do
            python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "✓ $f" || exit 1
          done
